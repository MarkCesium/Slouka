services:
  database:
    profiles: [disabled]

  redis:
    profiles: [disabled]

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./bot/.env
    networks:
      - slouka-net
      - shared-network

  worker:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./bot/.env
    networks:
      - slouka-net
      - shared-network

  scheduler:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./bot/.env
    networks:
      - slouka-net
      - shared-network

networks:
  slouka-net:
    driver: bridge
  shared-network:
    external: true
    name: shared-network
