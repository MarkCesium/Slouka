services:
  database:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.dev
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./bot/src:/bot/src
      - ./bot/migrations:/bot/migrations

  worker:
    build:
      context: ./bot
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./bot/src:/bot/src
    env_file: ./bot/.env

  scheduler:
    build:
      context: ./bot
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./bot/src:/bot/src
    env_file: ./bot/.env

networks:
  slouka-net:
    driver: bridge
