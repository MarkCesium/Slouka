name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "bot/**"
      - ".github/workflows/**"
  workflow_call:

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: cp .env.example .env
      - run: uv sync

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: cp .env.example .env
      - run: uv sync

      - name: Run tests
        run: uv run pytest tests -v --tb=short --cov=src --cov-report=term-missing
