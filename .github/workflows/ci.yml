name: CI

on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "bot/**"
      - ".github/workflows/**"
  workflow_call:

jobs:
  bot:
    name: Bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: cp .env.example .env
      - run: uv sync

      - name: Ruff check
        run: uv run ruff check src

      - name: Ruff format
        run: uv run ruff format --check src

      - name: Mypy
        run: uv run mypy src
